name: Task / Maintenance
description: Propose a code cleanup, refactor, or maintenance task
labels: ["type:refactor"]
body:
  - type: textarea
    id: task
    attributes:
      label: Description of the task
      description: What needs to be cleaned up or refactored?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this cleanup or refactor necessary?
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this affect?
      options:
        - Engine
        - Services
        - Models
        - Plugins
        - Infrastructure
        - Tests
        - CI/CD
