name: Documentation Issue
description: Suggest an improvement or report an error in the documentation
labels: ["type:docs"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation!
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
      description: A clear and concise description of what the documentation issue is.
      placeholder: The section on WSL configuration is missing information about...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: How can it be improved?
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any links to the specific files or sections.
